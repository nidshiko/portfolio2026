<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luciana Salomón — Graphic Designer & Illustrator</title>
  <meta name="description" content="Portfolio of Luciana Salomón, Graphic Designer and Illustrator based in Buenos Aires. Book design, editorial, packaging, illustration, and production design.">
  <meta name="author" content="Luciana Salomón">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://lucianasalomon.com/">
  <meta property="og:title" content="Luciana Salomón — Graphic Designer & Illustrator">
  <meta property="og:description" content="Portfolio of Luciana Salomón, Graphic Designer and Illustrator based in Buenos Aires. Book design, editorial, packaging, illustration, and production design.">
  <meta property="og:image" content="https://lucianasalomon.com/img/og_image.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Archivo:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0e0e0e; }
    body { font-family: 'Archivo', sans-serif; -webkit-font-smoothing: antialiased; }

    canvas { position: fixed; inset: 0; z-index: 0; }

    .content {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .name {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(52px, 10vw, 110px);
      letter-spacing: -0.03em;
      line-height: 0.95;
      color: #ffffff;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }
    .name em { font-style: italic; color: rgba(255,255,255,0.45); display: block; }
    .name.show { opacity: 1; transform: translateY(0); }

    .tagline {
      font-size: clamp(11px, 1.5vw, 13px);
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-top: 2rem;
      opacity: 0;
      transition: opacity 0.8s ease 0.6s;
    }
    .tagline.show { opacity: 1; }

    .enter-wrap {
      margin-top: 3.5rem;
      opacity: 0;
      transition: opacity 0.7s ease 1.2s;
    }
    .enter-wrap.show { opacity: 1; }

    .enter-btn {
      font-family: 'Archivo', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      background: transparent;
      border: 0.5px solid rgba(255,255,255,0.2);
      padding: 14px 36px;
      border-radius: 2px;
      cursor: pointer;
      transition: color 0.3s, border-color 0.3s, transform 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .enter-btn:hover {
      color: #ffffff;
      border-color: rgba(255,255,255,0.7);
      transform: translateY(-1px);
    }

    .overlay-exit {
      position: fixed;
      inset: 0;
      background: #0e0e0e;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.1s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .overlay-exit.active { opacity: 1; }

    .scroll-hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      opacity: 0;
      transition: opacity 0.7s ease 2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .scroll-hint.show { opacity: 1; }
    .scroll-hint span {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }
    .scroll-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      animation: pulse 2s ease-in-out infinite;
    }
    .lang-toggle-index { position:fixed; top:2rem; right:2rem; z-index:200; display:flex; align-items:center; gap:0.5rem; }
    .lang-btn-index { font-family: 'Archivo', sans-serif; font-size:11px; font-weight:300; letter-spacing:0.15em; text-transform:uppercase; color:rgba(255,255,255,0.5); background:transparent; border:none; outline:none; cursor:pointer; padding:0; transition:color 0.2s; }
    .lang-btn-index.active { color:#ffffff; }
    .lang-btn-index:hover { color:rgba(255,255,255,0.8); }
    .lang-sep-index { font-size:11px; color:rgba(255,255,255,0.2); font-weight:300; }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.4); }
    }
  </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HM398XTRWW"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HM398XTRWW');
  </script>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="lang-toggle-index">
    <button class="lang-btn-index active" id="btn-en" onclick="setLang('en')">EN</button>
    <span class="lang-sep-index">/</span>
    <button class="lang-btn-index" id="btn-es" onclick="setLang('es')">ES</button>
  </div>
  <div class="overlay-exit" id="overlay"></div>

  <div class="content">
    <h1 class="name" id="name">
      Luciana
      <em>Salomón</em>
    </h1>
    <p class="tagline" id="tagline" data-i18n="tagline">Design &nbsp;·&nbsp; Illustration &nbsp;·&nbsp; Editorial</p>
    <div class="enter-wrap" id="enter-wrap">
      <a href="portfolio.html" class="enter-btn" id="enter-btn" data-i18n="enter_btn">Enter</a>
    </div>
  </div>

  <script>
    // Particle field
    var isMobile = window.innerWidth < 768;
    var canvas = document.getElementById('c');
    var ctx = canvas.getContext('2d');
    var W, H, particles = [], mouse = { x: -999, y: -999 };
    var COUNT = isMobile ? 25 : 80;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function Particle() {
      this.reset();
    }
    Particle.prototype.reset = function() {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.size = Math.random() * 1.5 + 0.3;
      this.vx = (Math.random() - 0.5) * 0.3;
      this.vy = (Math.random() - 0.5) * 0.3;
      this.alpha = Math.random() * 0.5 + 0.1;
    };
    Particle.prototype.update = function() {
      var dx = this.x - mouse.x;
      var dy = this.y - mouse.y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        var force = (120 - dist) / 120 * 0.8;
        this.vx += (dx / dist) * force;
        this.vy += (dy / dist) * force;
      }
      this.vx *= 0.97;
      this.vy *= 0.97;
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < 0) this.x = W;
      if (this.x > W) this.x = 0;
      if (this.y < 0) this.y = H;
      if (this.y > H) this.y = 0;
    };

    for (var i = 0; i < COUNT; i++) {
      particles.push(new Particle());
    }

    window.addEventListener('mousemove', function(e) {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    function drawConnections() {
      if (isMobile) return;
      for (var i = 0; i < particles.length; i++) {
        for (var j = i + 1; j < particles.length; j++) {
          var dx = particles[i].x - particles[j].x;
          var dy = particles[i].y - particles[j].y;
          var d = Math.sqrt(dx * dx + dy * dy);
          if (d < 130) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = 'rgba(255,255,255,' + (0.06 * (1 - d / 130)) + ')';
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      drawConnections();
      for (var i = 0; i < particles.length; i++) {
        particles[i].update();
        ctx.beginPath();
        ctx.arc(particles[i].x, particles[i].y, particles[i].size, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,' + particles[i].alpha + ')';
        ctx.fill();
      }
      requestAnimationFrame(loop);
    }
    loop();

    // Text animations
    setTimeout(function() { document.getElementById('name').classList.add('show'); }, 300);
    setTimeout(function() { document.getElementById('tagline').classList.add('show'); }, 900);
    setTimeout(function() {
      document.getElementById('enter-wrap').classList.add('show');
      document.getElementById('hint').classList.add('show');
    }, 1400);

    // Preload portfolio
    var link = document.createElement('link');
    link.rel = 'prefetch';
    link.href = 'portfolio.html';
    document.head.appendChild(link);

    // Enter button
    var triggered = false;
    document.getElementById('enter-btn').addEventListener('click', function(e) {
      e.preventDefault();
      if (triggered) return;
      triggered = true;
      var ov = document.getElementById('overlay');
      ov.classList.add('active');
      setTimeout(function() { window.location.href = 'portfolio.html'; }, 1100);
    });

    // i18n
    var translations = {
      en: { tagline: 'Design &nbsp;·&nbsp; Illustration &nbsp;·&nbsp; Editorial', enter_btn: 'Enter' },
      es: { tagline: 'Diseño &nbsp;·&nbsp; Ilustración &nbsp;·&nbsp; Editorial', enter_btn: 'Entrar' }
    };
    function setLang(lang) {
      localStorage.setItem('lang', lang);
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.getElementById('btn-es').classList.toggle('active', lang === 'es');
      document.querySelectorAll('[data-i18n]').forEach(function(el) {
        var key = el.getAttribute('data-i18n');
        if (translations[lang][key] !== undefined) el.innerHTML = translations[lang][key];
      });
    }
    var savedLang = localStorage.getItem('lang') || 'en';
    setLang(savedLang);
  </script>
</body>
</html>
