<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV — Luciana Salomón</title>
  <meta name="description" content="CV of Luciana Salomón, Graphic Designer and Illustrator based in Buenos Aires.">
  <meta name="author" content="Luciana Salomón">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Archivo:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#faf9f7; --text:#111111; --text-secondary:#555555; --text-tertiary:#999999; --border:rgba(0,0,0,0.12); }
    body { font-family:'Archivo',sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; animation:fadeIn 0.3s ease forwards; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    #curtain { position:fixed; inset:0; background:var(--bg); z-index:999; opacity:0; pointer-events:none; transition:opacity 0.3s ease; }
    #curtain.cover { opacity:1; pointer-events:all; }
    .port { max-width:1100px; margin:0 auto; padding:0 3rem 6rem; }
    nav { display:flex; justify-content:space-between; align-items:center; padding:2rem 0; margin-bottom:3rem; }
    .nav-name { font-family:'Archivo',sans-serif; font-size:14px; font-weight:500; letter-spacing:-0.01em; text-decoration:none; color:var(--text); }
    .nav-links { display:flex; gap:2.5rem; list-style:none; }
    .nav-links a { font-size:11px; font-weight:300; color:var(--text-tertiary); text-decoration:none; letter-spacing:0.1em; text-transform:uppercase; transition:color 0.2s; }
    .nav-links a:hover { color:var(--text); }
    .cv-header { display:flex; justify-content:space-between; align-items:baseline; padding-bottom:1rem; border-bottom:0.5px solid var(--border); margin-bottom:2rem; }
    .cv-title { font-family:'DM Serif Display',serif; font-size:28px; letter-spacing:-0.02em; }
    .cv-download { font-size:11px; font-weight:300; color:var(--text-tertiary); text-decoration:none; letter-spacing:0.1em; text-transform:uppercase; transition:color 0.2s; }
    .cv-download:hover { color:var(--text); }
    .cv-embed { width:100%; height:85vh; border:none; border-radius:4px; }
    @media (max-width:600px) { .port { padding:0 1.5rem 4rem; } .nav-links { display:none; } .cv-embed { height:70vh; } }
    .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; background:none; border:none; padding:0; }
    .hamburger span { display:block; width:22px; height:1px; background:var(--text); transition:all 0.3s ease; }
    .hamburger.open span:nth-child(1) { transform:translateY(6px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity:0; }
    .hamburger.open span:nth-child(3) { transform:translateY(-6px) rotate(-45deg); }
    .mobile-menu { display:none; position:fixed; inset:0; background:var(--bg); z-index:998; flex-direction:column; align-items:center; justify-content:center; gap:2.5rem; }
    .mobile-menu.open { display:flex; }
    .mobile-menu a { font-family:'DM Serif Display',serif; font-size:32px; letter-spacing:-0.02em; text-decoration:none; color:var(--text); }
    @media (max-width:600px) { .hamburger { display:flex; } .nav-links { display:none !important; } }
    .lang-toggle { display:flex; align-items:center; gap:0.4rem; margin-left:2rem; }
    .lang-btn { font-family:'Archivo',sans-serif; font-size:11px; font-weight:300; letter-spacing:0.1em; color:var(--text-tertiary); background:none; border:none; outline:none; cursor:pointer; padding:0; transition:color 0.2s; }
    .lang-btn.active { color:var(--text); }
    .lang-btn:hover { color:var(--text); }
    .lang-sep { font-size:11px; color:var(--text-tertiary); font-weight:300; }
    .mobile-close { position:absolute; top:2rem; right:2rem; font-size:24px; font-weight:300; background:none; border:none; color:var(--text); cursor:pointer; line-height:1; padding:0; }
    @media (max-width:600px) { .lang-toggle { margin-left:1rem; } }
  </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HM398XTRWW"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HM398XTRWW');
  </script>
</head>
<body>
  <div id="curtain"></div>
  <div class="mobile-menu" id="mobile-menu">
    <button class="mobile-close" id="mobile-close">&times;</button>
    <a href="portfolio.html" data-i18n="nav_work">Work</a>
    <a href="about.html" data-i18n="nav_about">About</a>
    <a href="cv.html">CV</a>
    <a href="contact.html" data-i18n="nav_contact">Contact</a>
  </div>
  <div class="port">
    <nav>
      <a href="portfolio.html" class="nav-name">Luciana Salomón</a>
      <ul class="nav-links">
        <li><a href="portfolio.html" data-i18n="nav_work">Work</a></li>
        <li><a href="about.html" data-i18n="nav_about">About</a></li>
        <li><a href="cv.html">CV</a></li>
        <li><a href="contact.html" data-i18n="nav_contact">Contact</a></li>
      </ul>
      <div class="lang-toggle">
        <span class="lang-btn active" id="btn-en" onclick="setLang('en')" style="cursor:pointer">EN</span>
        <span class="lang-sep">/</span>
        <span class="lang-btn" id="btn-es" onclick="setLang('es')" style="cursor:pointer">ES</span>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </nav>

    <div class="cv-header">
      <h1 class="cv-title">CV</h1>
      <a href="Luciana_Salomon_CV.pdf" download class="cv-download" id="cv-download-link" data-i18n="cv_download">Download PDF ↓</a>
    </div>

    <embed src="Luciana_Salomon_CV.pdf" type="application/pdf" class="cv-embed" id="cv-embed">

  </div>

  <script>
    document.querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', function(e) {
        var href = a.getAttribute('href');
        if (!href || href.startsWith('http') || href.startsWith('mailto') || href.startsWith('#') || href.includes('#') || a.hasAttribute('download')) return;
        e.preventDefault();
        document.getElementById('curtain').classList.add('cover');
        setTimeout(function() { window.location.href = href; }, 300);
      });
    });
      // Reset curtain on back button
    window.addEventListener('pageshow', function(e) {
      document.getElementById('curtain').classList.remove('cover');
      document.getElementById('curtain').style.opacity = '0';
    });
    // Hamburger menu
    var ham = document.getElementById('hamburger');
    var menu = document.getElementById('mobile-menu');
    if (ham) {
      ham.addEventListener('click', function() {
        ham.classList.toggle('open');
        menu.classList.toggle('open');
      });
      menu.querySelectorAll('a').forEach(function(a) {
        a.addEventListener('click', function() {
          ham.classList.remove('open');
          menu.classList.remove('open');
        });
      });
    }
  </script>
  <script>
    var closeBtn = document.getElementById('mobile-close');
    if (closeBtn) {
      closeBtn.addEventListener('click', function() {
        document.getElementById('hamburger').classList.remove('open');
        document.getElementById('mobile-menu').classList.remove('open');
      });
    }
    var translations = { en: {"nav_work": "Work", "nav_about": "About", "nav_contact": "Contact", "cv_download": "Download PDF ↓"}, es: {"nav_work": "Portfolio", "nav_about": "Sobre mí", "nav_contact": "Contacto", "cv_download": "Descargar PDF ↓"} };
    var cvFiles = { en: 'Luciana_Salomon_CV.pdf', es: 'CV_Luciana_Salomon_ES.pdf' };
    function setLang(lang) {
      localStorage.setItem('lang', lang);
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.getElementById('btn-es').classList.toggle('active', lang === 'es');
      document.querySelectorAll('[data-i18n]').forEach(function(el) {
        var key = el.getAttribute('data-i18n');
        if (translations[lang][key] !== undefined) el.innerHTML = translations[lang][key];
      });
      var pdf = cvFiles[lang];
      document.getElementById('cv-embed').src = pdf;
      document.getElementById('cv-download-link').href = pdf;
    }
    var savedLang = localStorage.getItem('lang') || 'en';
    setLang(savedLang);
  </script>
</body>
</html>
